version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5050:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=super-secret-key-taskflow-jwt-token-2026
      - FRONTEND_URL=http://localhost:3030
      - NODE_ENV=development

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3030:3000"
    environment:
      - VITE_API_BASE=http://localhost:5050/api
    depends_on:
      - backend
